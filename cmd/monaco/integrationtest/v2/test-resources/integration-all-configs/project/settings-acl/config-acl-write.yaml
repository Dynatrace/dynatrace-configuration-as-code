configs:
- id: config-acl-write
  config:
    name: Connection-write
    template: settings.json
    skip: true # platform only config
  environmentOverrides:
    - environment: platform_env
      override:
        skip: false
  type:
    settings:
      schema: app:my.dynatrace.github.connector:connection
      schemaVersion: "1"
      scope: environment
      permissions:
        allUsers: write

name: Dependencies and Licenses
on:
  release:
    types:
      - published

defaults:
  run:
    shell: bash

jobs:
  generate-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Core Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version-file: go.mod

      - name: Install go-licence-detector
        run: |
          go install go.elastic.co/go-licence-detector@v0.6.0
      - name: Clean Go mod
        run: go mod tidy

      - name: Generate Dependencies and Licenses
        run: go list -m -json all | go-licence-detector -includeIndirect -depsTemplate=.dependencies/templates/dependencies.csv.tmpl -depsOut=dependencies-and-licenses.txt

      - name: Upload dependencies and licenses artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dependencies-and-licenses.txt \
            --repo "${{ github.repository }}" \
            --clobber

  verify-shasums:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern 'monaco-*' \
            --dir release-assets

      - name: Verify SHA256 sums
        working-directory: release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          sums=(*.sha256)
          if [ ${#sums[@]} -eq 0 ]; then
            echo "no .sha256 files found in release assets"
            exit 1
          fi
          for s in "${sums[@]}"; do
            echo "checking $s"
            sha256sum --check --strict "$s"
          done

  verify-windows-signatures:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Download Windows release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p release-assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern 'monaco-windows-*.exe' \
            --dir release-assets

      - name: Verify Windows Authenticode signatures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exes = Get-ChildItem -Path release-assets -Filter 'monaco-windows-*.exe' -File
          if ($exes.Count -eq 0) {
              Write-Error 'no windows .exe assets found in release'
              exit 1
          }
          $signtool = (Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter 'signtool.exe' |
              Where-Object { $_.FullName -match '\\x64\\signtool.exe$' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1).FullName
          if (-not $signtool) {
              Write-Error 'signtool.exe not found on the runner'
              exit 1
          }
          Write-Host "using signtool: $signtool"
          $failed = $false
          foreach ($exe in $exes) {
              Write-Host "verifying signature of $($exe.Name)"
              & $signtool verify /pa /all /v $exe.FullName
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "FAILED: $($exe.Name)"
                  $failed = $true
              }
          }
          if ($failed) { exit 1 }
